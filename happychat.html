<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属聊天室</title>

<style>
/* ===== 星空背景（和你主页一致）===== */
body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #0b0f1a;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 1%, transparent 1%),
        radial-gradient(1px 1px at 30% 60%, #fff 1%, transparent 1%);
    z-index: -3;
}

body::after {
    content: "";
    position: fixed;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255,255,255,0.08) 30deg,
        transparent 60deg,
        transparent 180deg,
        rgba(255,255,255,0.08) 210deg,
        transparent 240deg,
        transparent 360deg
    );
    animation: starTrail 40s linear infinite;
    z-index: -2;
    filter: blur(6px);
}

@keyframes starTrail {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.rainbow-bg {
    position: fixed;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        #ff0000,
        #ff7f00,
        #ffff00,
        #00ff00,
        #00ffff,
        #0000ff,
        #8b00ff,
        #ff0000
    );
    animation: rainbowSpin 21s linear infinite;
    z-index: -1;
    opacity: 0.25;
    filter: blur(120px);
}

@keyframes rainbowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* ===== 聊天室 UI ===== */
.chat-box {
    width: 90%;
    max-width: 420px;
    height: 75vh;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 1;
}

.chat-header {
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
    background: rgba(173,216,230,0.6);
    color: #333;
    text-align: center;
}

.chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* ===== 消息进场动画 ===== */
.msg-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 85%;
    opacity: 0;
    transform: scale(0.95);
    animation: msgIn 0.3s ease forwards;
}

.msg-wrapper.me {
    align-self: flex-end;
    flex-direction: row-reverse;
}

@keyframes msgIn {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.avatar-mini {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #add8e6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
}

.nickname {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
}

.msg {
    padding: 8px 12px;
    background: #eef4ff;
    border-radius: 8px;
    font-size: 15px;
    color: #333;
    word-break: break-word;
}

.msg.me {
    background: #d2f8d2;
}

/* ===== 语音波形 ===== */
.voice-msg {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #d2f8d2;
    border-radius: 20px;
    max-width: 70%;
    align-self: flex-end;
    cursor: pointer;
}

.voice-wave {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
}

.wave-bar {
    width: 4px;
    background: #333;
    border-radius: 2px;
    animation: wave 1.2s infinite ease-in-out;
}

.wave-bar:nth-child(2) { animation-delay: .2s; height: 10px; }
.wave-bar:nth-child(3) { animation-delay: .4s; height: 14px; }
.wave-bar:nth-child(4) { animation-delay: .6s; height: 10px; }

@keyframes wave {
    0%, 100% { transform: scaleY(0.6); }
    50% { transform: scaleY(1); }
}

.voice-duration {
    font-size: 12px;
    color: #555;
}

/* ===== 输入区 ===== */
.chat-input {
    display: flex;
    border-top: 1px solid #ddd;
}

.chat-input input {
    flex: 1;
    border: none;
    padding: 12px;
    font-size: 14px;
    outline: none;
}

.chat-input button {
    border: none;
    background: #add8e6;
    padding: 0 16px;
    cursor: pointer;
    font-weight: bold;
    color: #333;
}

.mic-btn {
    border: none;
    background: #ff6b6b;
    color: #fff;
    font-size: 20px;
    padding: 0 12px;
    cursor: pointer;
}

.mic-btn.recording {
    background: #ff3b3b;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.back-btn {
    margin-top: 15px;
    display: inline-block;
    padding: 10px 20px;
    background: #add8e6;
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    border-radius: 6px;
}
    /* ===== 系统提示 ===== */
.system-toast {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 10;
    opacity: 0;
    animation: toastInOut 3s ease forwards;
    pointer-events: none;
}

@keyframes toastInOut {
    0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
    }
    15% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    85% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
    }
}
</style>
</head>

<body>

<div class="rainbow-bg"></div>

<div class="chat-box">
    <div class="chat-header">💬 我的专属聊天室</div>
    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <input type="text" id="textInput" placeholder="说点什么…">
        <button onclick="sendText()">发送</button>
        <button class="mic-btn" id="micBtn"
            onmousedown="startVoice()"
            onmouseup="stopVoice()"
            ontouchstart="startVoice()"
            ontouchend="stopVoice()">
            🎤
        </button>
    </div>
</div>

<div style="position:absolute;bottom:20px;">
    <a href="index.html" class="back-btn">返回主页</a>
</div>

<script>
/* ===== 当前用户 ===== */
const currentUser = {
    uid: "me",
    nickname: "夏洛希",
    avatar: "夏"
};

/* ===== 机器人 ===== */
const bots = [
    { uid: "bot1", nickname: "张三", avatar: "张", text: "你好呀 👋" },
    { uid: "bot2", nickname: "李四", avatar: "李", text: "欢迎来到聊天室～" },
    { uid: "bot3", nickname: "王五", avatar: "王", text: "今天也要开心哦 🌈" }
];

/* ===== 页面加载后机器人依次说话 ===== */
window.onload = () => {
    bots.forEach((bot, index) => {
        setTimeout(() => {
            renderMessage(bot.text, false, bot);
        }, 800 * (index + 1));
    });
};

/* ===== 文本发送 ===== */
function sendText() {
    const input = document.getElementById("textInput");
    if (!input.value.trim()) return;
    renderMessage(input.value, true, currentUser);
    input.value = "";
}

/* ===== 渲染消息 ===== */
function renderMessage(text, isMe, user = currentUser) {
    const wrapper = document.createElement("div");
    wrapper.className = "msg-wrapper " + (isMe ? "me" : "");

    const avatar = document.createElement("div");
    avatar.className = "avatar-mini";
    avatar.textContent = user.avatar;

    const content = document.createElement("div");

    const nick = document.createElement("div");
    nick.className = "nickname";
    nick.textContent = user.nickname;

    const msg = document.createElement("div");
    msg.className = "msg";
    msg.textContent = text;

    content.appendChild(nick);
    content.appendChild(msg);
    wrapper.appendChild(avatar);
    wrapper.appendChild(content);

    document.getElementById("messages").appendChild(wrapper);
    scrollBottom();
}

/* ===== 语音（保持不变）===== */
let mediaRecorder;
let audioChunks = [];

async function startVoice() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        document.getElementById("micBtn").classList.add("recording");
    } catch {
        alert("麦克风权限被拒绝 😢");
    }
}

mediaRecorder?.addEventListener("stop", async () => {
    const blob = new Blob(audioChunks, { type: "audio/webm" });
    const base64 = await blobToBase64(blob);
    renderVoice(base64);
});

function stopVoice() {
    mediaRecorder?.stop();
    document.getElementById("micBtn").classList.remove("recording");
}

function renderVoice(base64) {
    const wrapper = document.createElement("div");
    wrapper.className = "msg-wrapper me";

    const avatar = document.createElement("div");
    avatar.className = "avatar-mini";
    avatar.textContent = currentUser.avatar;

    const content = document.createElement("div");

    const nick = document.createElement("div");
    nick.className = "nickname";
    nick.textContent = currentUser.nickname;

    const voice = document.createElement("div");
    voice.className = "voice-msg";
    voice.innerHTML = `
        <div class="voice-wave">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="voice-duration">点击播放</div>
    `;
    voice.onclick = () => new Audio(base64).play();

    content.appendChild(nick);
    content.appendChild(voice);
    wrapper.appendChild(avatar);
    wrapper.appendChild(content);

    document.getElementById("messages").appendChild(wrapper);
    scrollBottom();
}

function scrollBottom() {
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
}

function blobToBase64(blob) {
    return new Promise(resolve => {
        const r = new FileReader();
        r.onloadend = () => resolve(r.result);
        r.readAsDataURL(blob);
    });
}
</script>
