<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属聊天室</title>

<style>
/* ===== 星空背景（和你主页一致）===== */
body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #0b0f1a;
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 1%, transparent 1%),
        radial-gradient(1px 1px at 30% 60%, #fff 1%, transparent 1%);
    z-index: -3;
}

body::after {
    content: "";
    position: fixed;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7, #dda0dd, #ff6b6b
    );
    animation: rotate 20s linear infinite;
    z-index: -4;
}

@keyframes rotate {
    100% { transform: rotate(360deg); }
}

/* ===== 聊天容器 ===== */
.chat-container {
    width: 95vw;
    max-width: 900px;
    height: 90vh;
    max-height: 700px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* ===== 标题栏 ===== */
.header {
    padding: 16px 20px;
    text-align: center;
    color: white;
    font-size: 18px;
    font-weight: bold;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(0, 0, 0, 0.2);
}

/* ===== 消息区域 ===== */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
}

/* ===== 系统提示 ===== */
.system-toast {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 10;
    opacity: 0;
    animation: toastInOut 3s ease forwards;
    pointer-events: none;
}

@keyframes toastInOut {
    0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
    }
    15% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    85% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
    }
}

/* ===== 消息项 ===== */
.message {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
    position: relative;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.message.self {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.message.other {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
}

.nickname {
    font-weight: bold;
    margin-bottom: 4px;
    display: block;
    font-size: 13px;
    opacity: 0.9;
}

/* ===== 输入栏 ===== */
.input-bar {
    padding: 16px 20px;
    background: rgba(0, 0, 0, 0.2);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    gap: 10px;
    align-items: center;
}

#textInput {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 15px;
    outline: none;
    transition: background 0.2s;
}

#textInput:focus {
    background: rgba(255, 255, 255, 0.15);
}

#sendBtn {
    padding: 12px 24px;
    border: none;
    border-radius: 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
}

#sendBtn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

#sendBtn:active {
    transform: translateY(0);
}

/* ===== 录音按钮 ===== */
.record-btn {
    padding: 12px 16px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    color: white;
    cursor: pointer;
    font-size: 18px;
    transition: transform 0.1s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.record-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
}

.record-btn.recording {
    animation: pulse 1s infinite;
    background: linear-gradient(135deg, #ff4757, #ff6b6b);
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* ===== 移动端适配 ===== */
@media (max-width: 768px) {
    .chat-container {
        width: 98vw;
        height: 95vh;
        max-height: none;
        border-radius: 12px;
    }

    .header {
        padding: 12px 16px;
        font-size: 16px;
    }

    .chat-box {
        padding: 16px;
        gap: 10px;
    }

    .message {
        max-width: 85%;
        padding: 10px 14px;
        font-size: 14px;
    }

    .input-bar {
        padding: 12px 16px;
        gap: 8px;
    }

    #textInput {
        padding: 10px 14px;
        font-size: 14px;
    }

    #sendBtn {
        padding: 10px 20px;
        font-size: 14px;
    }

    .record-btn {
        padding: 10px 14px;
        font-size: 16px;
    }
}

/* ===== 滚动条美化 ===== */
.chat-box::-webkit-scrollbar {
    width: 6px;
}

.chat-box::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 3px;
}

.chat-box::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
}

.chat-box::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
}
</style>

</head>
<body>

<div class="chat-container">
    <div class="header">🌟 我的专属聊天室</div>

    <div class="chat-box" id="chatBox">
        <!-- 系统提示 -->
        <div class="system-toast" id="systemToast">✅ 聊天室已连接，开始畅聊吧！</div>

        <!-- 机器人初始问候 -->
        <!-- 后续用 JS 动态插入 -->
    </div>

    <div class="input-bar">
        <button class="record-btn" id="recordBtn" title="按住说话">🎤</button>
        <input type="text" id="textInput" placeholder="输入消息..." />
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
/* ===== 当前用户 ===== */
const currentUser = {
    uid: "me",
    nickname: "夏洛希",
    avatar: "夏"
};

/* ===== 机器人 ===== */
const bots = [
    { uid: "bot1", nickname: "张三", avatar: "张", texts: ["你好呀 👋", "今天天气不错～", "你今天开心吗？"] },
    { uid: "bot2", nickname: "李四", avatar: "李", texts: ["欢迎来到聊天室～", "有什么我可以帮你的？", "别客气，随时找我～"] },
    { uid: "bot3", nickname: "王五", avatar: "王", texts: ["今天也要开心哦 🌈", "记得多喝水～", "有什么好玩的事分享吗？"] }
];

/* ===== DOM 元素 ===== */
const chatBox = document.getElementById("chatBox");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");
const recordBtn = document.getElementById("recordBtn");
const systemToast = document.getElementById("systemToast");

/* ===== 显示系统提示 ===== */
function showSystemToast(msg) {
    systemToast.textContent = msg;
    systemToast.style.animation = "none";
    void systemToast.offsetWidth; // 触发重绘
    systemToast.style.animation = "toastInOut 3s ease forwards";
}

/* ===== 渲染消息 ===== */
function renderMessage(text, isSelf, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${isSelf ? "self" : "other"}`;

    const avatarSpan = document.createElement("span");
    avatarSpan.className = "avatar";
    avatarSpan.textContent = sender.avatar;

    const nicknameSpan = document.createElement("span");
    nicknameSpan.className = "nickname";
    nicknameSpan.textContent = sender.nickname;

    const textNode = document.createTextNode(text);

    msgDiv.appendChild(avatarSpan);
    msgDiv.appendChild(nicknameSpan);
    msgDiv.appendChild(textNode);

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 机器人初始问候 ===== */
window.onload = () => {
    showSystemToast("✅ 聊天室已连接，开始畅聊吧！");

    bots.forEach((bot, index) => {
        setTimeout(() => {
            const randomText = bot.texts[Math.floor(Math.random() * bot.texts.length)];
            renderMessage(randomText, false, bot);
        }, 800 * (index + 1));
    });

    // 启动机器人随机回复定时器
    startBotRandomReply();
};

/* ===== 机器人随机回复机制 ===== */
let botReplyTimer = null;

function startBotRandomReply() {
    botReplyTimer = setInterval(() => {
        // 随机选一个机器人
        const randomBot = bots[Math.floor(Math.random() * bots.length)];
        // 随机选一句台词
        const randomText = randomBot.texts[Math.floor(Math.random() * randomBot.texts.length)];

        // 随机延迟 1~3 秒（模拟“思考”）
        setTimeout(() => {
            renderMessage(randomText, false, randomBot);
        }, Math.random() * 2000 + 1000);

    }, 15000 + Math.random() * 15000); // 每 15~30 秒触发一次
}

/* ===== 文本发送 ===== */
function sendText() {
    const text = textInput.value.trim();
    if (!text) return;

    renderMessage(text, true, currentUser);
    textInput.value = "";

    // 可选：你发送后，机器人“立刻”回复一条（增强互动感）
    setTimeout(() => {
        const randomBot = bots[Math.floor(Math.random() * bots.length)];
        const randomText = randomBot.texts[Math.floor(Math.random() * randomBot.texts.length)];
        renderMessage(randomText, false, randomBot);
    }, 1000 + Math.random() * 2000);
}

/* ===== 录音按钮模拟 ===== */
let isRecording = false;

recordBtn.addEventListener("mousedown", () => {
    isRecording = true;
    recordBtn.classList.add("recording");
    recordBtn.textContent = "🔴";
    // 模拟录音中...
    setTimeout(() => {
        if (isRecording) {
            recordBtn.classList.remove("recording");
            recordBtn.textContent = "🎤";
            // 模拟识别出的文字
            const fakeText = "这是一段模拟的语音消息 🎙️";
            renderMessage(fakeText, true, currentUser);
        }
    }, 2000);
});

recordBtn.addEventListener("mouseup", () => {
    isRecording = false;
    recordBtn.classList.remove("recording");
    recordBtn.textContent = "🎤";
});

recordBtn.addEventListener("mouseleave", () => {
    isRecording = false;
    recordBtn.classList.remove("recording");
    recordBtn.textContent = "🎤";
});

/* ===== 事件绑定 ===== */
sendBtn.addEventListener("click", sendText);
textInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        sendText();
    }
});
</script>

</body>
</html>
