<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属聊天室</title>

<style>
/* ===== iOS 26 风格：纯白 + 毛玻璃 ===== */
body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #ffffff;          /* ✅ 纯白 */
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== 聊天容器 ===== */
.chat-container {
    width: 95vw;
    max-width: 900px;
    height: 90vh;
    max-height: 700px;
    background: rgba(245, 245, 247, 0.85); /* iOS 灰白 */
    border-radius: 22px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* ===== 标题栏 ===== */
.header {
    padding: 16px 20px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    color: #000;
    background: rgba(255, 255, 255, 0.6);
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
}

/* ===== 消息区域 ===== */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* ===== 系统提示 ===== */
.system-toast {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 10;
    opacity: 0;
    animation: toastInOut 3s ease forwards;
    pointer-events: none;
}

@keyframes toastInOut {
    0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
    }
    15% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    85% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
    }
}

/* ===== 消息气泡 ===== */
.message {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
    position: relative;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.message.self {
    background: #007AFF;   /* iOS 蓝 */
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.message.other {
    background: #e9e9eb;   /* iOS 灰 */
    color: #000;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34c759, #30d158);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    margin-right: 8px;
    vertical-align: middle;
}

.nickname {
    font-weight: 600;
    margin-bottom: 4px;
    display: block;
    font-size: 13px;
    opacity: 0.8;
}

/* ===== 输入栏 ===== */
.input-bar {
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.8);
    border-top: 0.5px solid rgba(0, 0, 0, 0.08);
    display: flex;
    gap: 10px;
    align-items: center;
}

#textInput {
    flex: 1;
    padding: 10px 14px;
    border: none;
    border-radius: 20px;
    background: #f2f2f7;
    font-size: 15px;
    outline: none;
}

#textInput:focus {
    background: #eaeaef;
}

#sendBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #007AFF;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
}

.record-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: #ff3b30;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.record-btn.recording {
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* ===== 移动端 ===== */
@media (max-width: 768px) {
    .chat-container {
        width: 100vw;
        height: 100vh;
        max-height: none;
        border-radius: 0;
    }

    .header {
        padding: 14px 16px;
        font-size: 16px;
    }

    .message {
        max-width: 82%;
        font-size: 14px;
    }

    #textInput {
        font-size: 14px;
        padding: 9px 12px;
    }

    #sendBtn {
        padding: 9px 16px;
        font-size: 14px;
    }

    .record-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">💬 我的专属聊天室</div>

    <div class="chat-box" id="chatBox">
        <div class="system-toast" id="systemToast">✅ 聊天室已连接</div>
    </div>

    <div class="input-bar">
        <button class="record-btn" id="recordBtn">🎤</button>
        <input type="text" id="textInput" placeholder="iMessage">
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
/* ===== 用户 ===== */
const currentUser = {
    uid: "me",
    nickname: "夏洛希",
    avatar: "夏"
};

/* ===== 机器人 ===== */
const bots = [
    { uid: "bot1", nickname: "张三", avatar: "张", texts: ["你好呀 👋", "今天天气不错～", "你今天开心吗？"] },
    { uid: "bot2", nickname: "李四", avatar: "李", texts: ["欢迎来到聊天室～", "有什么我可以帮你的？", "别客气～"] },
    { uid: "bot3", nickname: "王五", avatar: "王", texts: ["今天也要开心哦 🌈", "记得多喝水～", "分享点好玩的呗"] }
];

/* ===== DOM ===== */
const chatBox = document.getElementById("chatBox");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");
const recordBtn = document.getElementById("recordBtn");
const systemToast = document.getElementById("systemToast");

/* ===== 系统提示 ===== */
function showSystemToast(msg) {
    systemToast.textContent = msg;
    systemToast.style.animation = "none";
    void systemToast.offsetWidth;
    systemToast.style.animation = "toastInOut 3s ease forwards";
}

/* ===== 渲染消息 ===== */
function renderMessage(text, isSelf, sender) {
    const msg = document.createElement("div");
    msg.className = `message ${isSelf ? "self" : "other"}`;

    const avatar = document.createElement("span");
    avatar.className = "avatar";
    avatar.textContent = sender.avatar;

    const nick = document.createElement("span");
    nick.className = "nickname";
    nick.textContent = sender.nickname;

    const textNode = document.createTextNode(text);

    msg.appendChild(avatar);
    msg.appendChild(nick);
    msg.appendChild(textNode);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 机器人问候 ===== */
window.onload = () => {
    showSystemToast("✅ 聊天室已连接");

    bots.forEach((bot, i) => {
        setTimeout(() => {
            const t = bot.texts[Math.floor(Math.random() * bot.texts.length)];
            renderMessage(t, false, bot);
        }, 800 * (i + 1));
    });

    startBotRandomReply();
};

/* ===== 随机回复 ===== */
let botTimer = setInterval(() => {
    const bot = bots[Math.floor(Math.random() * bots.length)];
    const text = bot.texts[Math.floor(Math.random() * bot.texts.length)];
    setTimeout(() => {
        renderMessage(text, false, bot);
    }, Math.random() * 2000);
}, 15000 + Math.random() * 15000);

function startBotRandomReply() {}

/* ===== 发送 ===== */
function sendText() {
    const text = textInput.value.trim();
    if (!text) return;
    renderMessage(text, true, currentUser);
    textInput.value = "";

    setTimeout(() => {
        const bot = bots[Math.floor(Math.random() * bots.length)];
        const t = bot.texts[Math.floor(Math.random() * bot.texts.length)];
        renderMessage(t, false, bot);
    }, 1000 + Math.random() * 2000);
}

sendBtn.onclick = sendText;
textInput.addEventListener("keydown", e => e.key === "Enter" && sendText());

/* ===== 录音模拟 ===== */
let recording = false;
recordBtn.onmousedown = () => {
    recording = true;
    recordBtn.classList.add("recording");
    recordBtn.textContent = "🔴";
};
recordBtn.onmouseup = () => {
    recording = false;
    recordBtn.classList.remove("recording");
    recordBtn.textContent = "🎤";
    renderMessage("这是一段语音消息 🎙️", true, currentUser);
};
</script>

</body>
</html>
