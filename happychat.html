<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属聊天室</title>

<style>
body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #0b0f1a;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 1%, transparent 1%),
        radial-gradient(1px 1px at 30% 60%, #fff 1%, transparent 1%);
    z-index: -3;
}

body::after {
    content: "";
    position: fixed;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255,255,255,0.08) 30deg,
        transparent 60deg,
        transparent 180deg,
        rgba(255,255,255,0.08) 210deg,
        transparent 240deg,
        transparent 360deg
    );
    animation: starTrail 40s linear infinite;
    z-index: -2;
    filter: blur(6px);
}

@keyframes starTrail {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.rainbow-bg {
    position: fixed;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        #ff0000,
        #ff7f00,
        #ffff00,
        #00ff00,
        #00ffff,
        #0000ff,
        #8b00ff,
        #ff0000
    );
    animation: rainbowSpin 21s linear infinite;
    z-index: -1;
    opacity: 0.25;
    filter: blur(120px);
}

@keyframes rainbowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* ===== 聊天室 UI ===== */
.chat-box {
    width: 90%;
    max-width: 420px;
    height: 75vh;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 1;
}

.chat-header {
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
    background: rgba(173,216,230,0.6);
    color: #333;
    text-align: center;
}

.chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 8px 12px;
    background: #eef4ff;
    border-radius: 8px;
    max-width: 80%;
    font-size: 15px;
    color: #333;
}

.msg.me {
    background: #d2f8d2;
    align-self: flex-end;
}

/* 语音消息 */
.voice-msg {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #d2f8d2;
    border-radius: 20px;
    max-width: 70%;
    align-self: flex-end;
    cursor: pointer;
}

.voice-icon {
    font-size: 18px;
}

.voice-duration {
    font-size: 12px;
    color: #555;
}

/* 输入区 */
.chat-input {
    display: flex;
    border-top: 1px solid #ddd;
}

.chat-input input {
    flex: 1;
    border: none;
    padding: 12px;
    font-size: 14px;
    outline: none;
}

.chat-input button {
    border: none;
    background: #add8e6;
    padding: 0 16px;
    cursor: pointer;
    font-weight: bold;
    color: #333;
}

/* 麦克风按钮 */
.mic-btn {
    border: none;
    background: #ff6b6b;
    color: #fff;
    font-size: 20px;
    padding: 0 12px;
    cursor: pointer;
    transition: background 0.3s;
}

.mic-btn.recording {
    background: #ff3b3b;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.back-btn {
    margin-top: 15px;
    display: inline-block;
    padding: 10px 20px;
    background: #add8e6;
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    border-radius: 6px;
}
    /* ===== 消息进场动画 ===== */
.msg {
    padding: 8px 12px;
    background: #eef4ff;
    border-radius: 8px;
    max-width: 80%;
    font-size: 15px;
    color: #333;
    word-break: break-word;
    opacity: 0;
    transform: scale(0.95);
    animation: msgIn 0.3s ease forwards;
}

.msg.me {
    background: #d2f8d2;
    align-self: flex-end;
}

@keyframes msgIn {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* ===== 头像 + 昵称 ===== */
.msg-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 85%;
}

.msg-wrapper.me {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.avatar-mini {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #add8e6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
}

.nickname {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
}

/* ===== 语音波形 ===== */
.voice-msg {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #d2f8d2;
    border-radius: 20px;
    max-width: 70%;
    align-self: flex-end;
    cursor: pointer;
}

.voice-wave {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
}

.wave-bar {
    width: 4px;
    background: #333;
    border-radius: 2px;
    animation: wave 1.2s infinite ease-in-out;
}

.wave-bar:nth-child(2) { animation-delay: .2s; height: 10px; }
.wave-bar:nth-child(3) { animation-delay: .4s; height: 14px; }
.wave-bar:nth-child(4) { animation-delay: .6s; height: 10px; }

@keyframes wave {
    0%, 100% { transform: scaleY(0.6); }
    50% { transform: scaleY(1); }
}

.voice-duration {
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="rainbow-bg"></div>

<div class="chat-box">
    <div class="chat-header">💬 我的专属聊天室</div>

    <div class="chat-messages" id="messages">
        <div class="msg">欢迎来到夏洛希的聊天室 ✨</div>
        <div class="msg me">今天试试语音消息吧 🎤</div>
    </div>

    <div class="chat-input">
        <input type="text" id="textInput" placeholder="说点什么…">
        <button onclick="sendText()">发送</button>
        <button class="mic-btn" id="micBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">🎤</button>
    </div>
</div>

<div style="position:absolute;bottom:20px;">
    <a href="index.html" class="back-btn">返回主页</a>
</div>

<script>
/* ===== 文本消息 ===== */
function sendText() {
    const input = document.getElementById("textInput");
    if (!input.value.trim()) return;

    const msg = document.createElement("div");
    msg.className = "msg me";
    msg.textContent = input.value;
    document.getElementById("messages").appendChild(msg);
    input.value = "";
    scrollBottom();
}

/* ===== 语音消息（模拟版）===== */
let voiceTimer;
let voiceStart;

function startVoice() {
    const btn = document.getElementById("micBtn");
    btn.classList.add("recording");
    voiceStart = Date.now();
}

function stopVoice() {
    const btn = document.getElementById("micBtn");
    btn.classList.remove("recording");

    const duration = Math.max(1, Math.round((Date.now() - voiceStart) / 1000));
    createVoiceMsg(duration);
}

function createVoiceMsg(seconds) {
    const wrapper = document.createElement("div");
    wrapper.className = "voice-msg";

    const icon = document.createElement("span");
    icon.className = "voice-icon";
    icon.textContent = "🎵";

    const durationText = document.createElement("span");
    durationText.className = "voice-duration";
    durationText.textContent = seconds + "″";

    wrapper.appendChild(icon);
    wrapper.appendChild(durationText);

    // 模拟播放
    wrapper.onclick = () => {
        alert("（模拟播放）时长：" + seconds + " 秒");
    };

    document.getElementById("messages").appendChild(wrapper);
    scrollBottom();
}

function scrollBottom() {
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
