<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属聊天室</title>

<style>
/* ===== iOS 26 纯白风 ===== */
body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-container {
    width: 95vw;
    max-width: 900px;
    height: 90vh;
    max-height: 700px;
    background: rgba(245, 245, 247, 0.85);
    border-radius: 22px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* ===== 右上角 ===== */
.top-bar {
    position: absolute;
    top: 12px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 20;
}

#shopBtn {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: #fff;
    border: none;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
}

#shopBtn:hover {
    opacity: 0.85;
}

#signBtn {
    background: linear-gradient(135deg, #34c759, #30d158);
    color: #fff;
    border: none;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.2s ease;
}

#signBtn:disabled {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
}

.points-bar {
    background: linear-gradient(135deg, #ffd700, #ffb300);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 4px 12px rgba(255, 183, 0, 0.3);
    user-select: none;
}

/* ===== 标题 ===== */
.header {
    padding: 16px 20px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    color: #000;
    background: rgba(255, 255, 255, 0.6);
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* ===== 系统提示 ===== */
.system-toast {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 10;
    opacity: 0;
    animation: toastInOut 3s ease forwards;
    pointer-events: none;
}

@keyframes toastInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}

/* ===== 消息气泡 ===== */
.message {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
    position: relative;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.message.self {
    background: #007AFF;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.message.other {
    background: #e9e9eb;
    color: #000;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34c759, #30d158);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    margin-right: 8px;
    vertical-align: middle;
}

.nickname {
    font-weight: 600;
    margin-bottom: 4px;
    display: block;
    font-size: 13px;
    opacity: 0.8;
}

/* ===== 语音气泡 ===== */
.voice-bubble {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
}

.voice-duration {
    font-size: 12px;
    opacity: 0.8;
}

/* ===== 声波图 ===== */
.waveform {
    display: none;
    align-items: flex-end;
    gap: 3px;
    height: 20px;
    margin-left: 6px;
}

.voice-bubble.show-wave .waveform {
    display: flex;
}

.wave-bar {
    width: 4px;
    background: currentColor;
    border-radius: 2px;
    animation: wave 1.2s infinite ease-in-out;
}

.wave-bar:nth-child(2) { animation-delay: .2s; height: 14px; }
.wave-bar:nth-child(3) { animation-delay: .4s; height: 20px; }
.wave-bar:nth-child(4) { animation-delay: .6s; height: 14px; }

@keyframes wave {
    0%, 100% { transform: scaleY(0.6); }
    50% { transform: scaleY(1); }
}

/* ===== 输入栏 ===== */
.input-bar {
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.8);
    border-top: 0.5px solid rgba(0, 0, 0, 0.08);
    display: flex;
    gap: 10px;
    align-items: flex-end;
}

#textInput {
    flex: 1;
    padding: 10px 14px;
    border: none;
    border-radius: 20px;
    background: #f2f2f7;
    font-size: 15px;
    line-height: 1.4;
    outline: none;
    resize: none;
    overflow-y: auto;
    min-height: 40px;
    max-height: calc(1.4em * 5);
    field-sizing: content;
}

#sendBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #007AFF;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    height: 40px;
}

/* ===== 录音按钮 ===== */
.record-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: #ff3b30;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
}

.record-btn.recording {
    animation: pulse 1s infinite;
}

.record-wave {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    gap: 3px;
}

.record-btn.recording .record-wave {
    display: flex;
}

.record-btn.recording span {
    display: none;
}

.record-wave .bar {
    width: 4px;
    height: 14px;
    background: #fff;
    border-radius: 2px;
    animation: wave 1s infinite ease-in-out;
}

.record-wave .bar:nth-child(2) { animation-delay: .2s; height: 20px; }
.record-wave .bar:nth-child(3) { animation-delay: .4s; height: 14px; }

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* ===== 确认弹窗 ===== */
.confirm-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}

.confirm-modal.show {
    opacity: 1;
    pointer-events: auto;
}

.confirm-box {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    width: 260px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: scale(0.95);
    transition: transform 0.2s ease;
}

.confirm-modal.show .confirm-box {
    transform: scale(1);
}

.confirm-box p {
    margin: 0 0 20px;
    font-size: 15px;
    color: #333;
}

.confirm-actions {
    display: flex;
    gap: 12px;
}

.confirm-actions button {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

.btn-cancel {
    background: #f2f2f7;
    color: #007AFF;
}

.btn-confirm {
    background: #ff3b30;
    color: #fff;
}

/* ===== 积分商城 ===== */
.shop-modal {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.shop-modal.active {
    display: flex;
}

/* 星轨 */
.shop-stars {
    position: absolute;
    inset: 0;
    background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 1%, transparent 1%),
        radial-gradient(1px 1px at 40% 70%, #fff 1%, transparent 1%);
    z-index: 0;
}

.shop-stars::after {
    content: "";
    position: absolute;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255,255,255,0.06) 30deg,
        transparent 60deg,
        transparent 180deg,
        rgba(255,255,255,0.06) 210deg,
        transparent 240deg,
        transparent 360deg
    );
    animation: shopStarTrail 40s linear infinite;
}

@keyframes shopStarTrail {
    100% { transform: rotate(360deg); }
}

/* 流星 */
.shop-meteor {
    position: absolute;
    top: -100px;
    left: -100px;
    width: 2px;
    height: 90px;
    background: linear-gradient(180deg, #fff, transparent);
    transform: rotate(135deg);
    transform-origin: center;
    opacity: 0;
    animation: shopMeteor 6s ease-in infinite;
    z-index: 1;
}

.shop-meteor:nth-child(2) {
    top: -120px;
    left: 50%;
    animation-delay: 3s;
}

@keyframes shopMeteor {
    0% {
        opacity: 0;
        transform: translate(0, 0) rotate(135deg);
    }
    10% {
        opacity: 1;
    }
    100% {
        opacity: 0;
        transform: translate(600px, 600px) rotate(135deg);
    }
}

/* 标题 */
.shop-title {
    font-size: 48px;
    font-weight: 800;
    color: #fff;
    text-shadow:
        0 0 12px rgba(255,255,255,0.6),
        0 0 24px rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.08);
    padding: 20px 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 2;
    letter-spacing: 4px;
}

/* 关闭按钮 */
.shop-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    font-size: 18px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
}

.shop-close:hover {
    background: rgba(255,255,255,0.2);
}

/* ===== 移动端 ===== */
@media (max-width: 768px) {
    .top-bar {
        top: 10px;
        right: 12px;
        gap: 8px;
    }

    #signBtn, #shopBtn {
        font-size: 12px;
        padding: 5px 12px;
    }

    .points-bar {
        font-size: 13px;
        padding: 5px 12px;
    }

    .chat-container {
        width: 100vw;
        height: 100vh;
        max-height: none;
        border-radius: 0;
    }

    .message {
        max-width: 82%;
        font-size: 14px;
    }

    #textInput {
        font-size: 14px;
    }

    #sendBtn {
        font-size: 14px;
        padding: 9px 16px;
    }

    .record-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
    }

    .shop-title {
        font-size: 32px;
        padding: 16px 28px;
    }
}
</style>
</head>

<body>

<div class="chat-container">
    <!-- 右上角 -->
    <div class="top-bar">
        <button id="shopBtn">🛒 积分商城</button>
        <button id="signBtn">📅 签到</button>
        <div class="points-bar" id="pointsBar">💰 10</div>
    </div>
    <div class="input-bar">
    <button class="plus-btn" id="plusBtn">+</button>

    <div class="emoji-panel" id="emojiPanel">
        <span>✅</span>
        <span>👍</span>
        <span>😄</span>
        <span>👌</span>
        <span>🤔</span>
        <span>🔍</span>
    </div>

    <button class="record-btn" id="recordBtn">...</button>
    <textarea id="textInput"></textarea>
    <button id="sendBtn">发送</button>
</div>

    <div class="header">💬 我的专属聊天室</div>

    <div class="chat-box" id="chatBox">
        <div class="system-toast" id="systemToast">✅ 聊天室已连接</div>
    </div>

    <div class="input-bar">
        <button class="record-btn" id="recordBtn">
            <span>🎤</span>
            <div class="record-wave">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </button>

        <textarea id="textInput" placeholder="iMessage（Enter 换行，Ctrl+Enter 发送）"></textarea>

        <button id="sendBtn">发送</button>
    </div>
</div>

<!-- 积分商城 -->
<div class="shop-modal" id="shopModal">
    <div class="shop-stars"></div>
    <div class="shop-meteor"></div>
    <div class="shop-meteor"></div>

    <div class="shop-title">积 分 商 城</div>

    <button class="shop-close" id="closeShop">✕</button>
</div>

<!-- 撤回确认 -->
<div class="confirm-modal" id="confirmModal">
    <div class="confirm-box">
        <p id="confirmText">确定要撤回吗？</p>
        <div class="confirm-actions">
            <button class="btn-cancel" id="cancelBtn">取消</button>
            <button class="btn-confirm" id="confirmBtn">撤回</button>
        </div>
    </div>
</div>

<script>
/* ===== 用户 ===== */
const currentUser = {
    uid: "me",
    nickname: "夏洛希",
    avatar: "夏"
};

/* ===== 机器人 ===== */
const bots = [
    { uid: "bot1", nickname: "张三", avatar: "张", texts: ["你好呀 👋", "今天天气不错～", "你今天开心吗？"] },
    { uid: "bot2", nickname: "李四", avatar: "李", texts: ["欢迎来到聊天室～", "有什么我可以帮你的？", "别客气～"] },
    { uid: "bot3", nickname: "王五", avatar: "王", texts: ["今天也要开心哦 🌈", "记得多喝水～", "分享点好玩的呗"] }
];

/* ===== DOM ===== */
const chatBox = document.getElementById("chatBox");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");
const recordBtn = document.getElementById("recordBtn");
const systemToast = document.getElementById("systemToast");
const signBtn = document.getElementById("signBtn");
const shopBtn = document.getElementById("shopBtn");
const shopModal = document.getElementById("shopModal");
const closeShop = document.getElementById("closeShop");

/* ===== 积分系统 ===== */
let points = parseInt(localStorage.getItem("points")) || 10;
const today = new Date().toDateString();
const lastLogin = localStorage.getItem("lastLogin");

if (lastLogin !== today) {
    points += 10;
    localStorage.setItem("lastLogin", today);
    showSystemToast("🎉 每日登录 +10 积分");
}
localStorage.setItem("points", points);

    /* ===== 签到系统（连续天数）===== */
const SIGN_KEY = "lastSignDate";
const STREAK_KEY = "signStreak";

function getStreak() {
    return parseInt(localStorage.getItem(STREAK_KEY)) || 0;
}

function updateStreak() {
    const lastSign = localStorage.getItem(SIGN_KEY);
    let streak = getStreak();

    if (lastSign === today) return streak; // 今天已签

    if (lastSign === new Date(Date.now() - 86400000).toDateString()) {
        streak++; // 连续
    } else {
        streak = 1; // 断了
    }

    localStorage.setItem(SIGN_KEY, today);
    localStorage.setItem(STREAK_KEY, streak);
    return streak;
}

function checkSignStatus() {
    const lastSign = localStorage.getItem(SIGN_KEY);
    const streak = getStreak();

    if (lastSign === today) {
        signBtn.disabled = true;
        signBtn.innerHTML = `✅ 已签到 · 连续 ${streak} 天`;
    } else {
        signBtn.disabled = false;
        signBtn.textContent = "📅 签到";
    }
}

signBtn.onclick = () => {
    if (signBtn.disabled) return;

    const streak = updateStreak();
    points += 10;
    updatePoints();

    signBtn.disabled = true;
    signBtn.innerHTML = `✅ 已签到 · 连续 ${streak} 天`;

    showSystemToast(`📅 签到成功 +10 积分 · 连续 ${streak} 天`);
};

/* ===== 商城 ===== */
shopBtn.onclick = () => shopModal.classList.add("active");
closeShop.onclick = () => shopModal.classList.remove("active");

/* ===== 确认弹窗 ===== */
const confirmModal = document.getElementById("confirmModal");
const confirmText = document.getElementById("confirmText");
const cancelBtn = document.getElementById("cancelBtn");
const confirmBtn = document.getElementById("confirmBtn");
let pendingAction = null;

function showConfirm(text, action) {
    confirmText.textContent = text;
    confirmModal.classList.add("show");
    pendingAction = action;
}

function hideConfirm() {
    confirmModal.classList.remove("show");
    pendingAction = null;
}

cancelBtn.onclick = hideConfirm;
confirmBtn.onclick = () => {
    if (pendingAction) pendingAction();
    hideConfirm();
};

/* ===== 录音限制 ===== */
const MIN_DURATION = 0.5;
const MAX_DURATION = 30;

let mediaRecorder;
let audioChunks = [];
let recordStartTime = 0;
let maxDurationTimer = null;

/* ===== 系统提示 ===== */
function showSystemToast(msg) {
    systemToast.textContent = msg;
    systemToast.style.animation = "none";
    void systemToast.offsetWidth;
    systemToast.style.animation = "toastInOut 3s ease forwards";
}

/* ===== 渲染消息 ===== */
function renderMessage(text, isSelf, sender, isVoice = false, duration = 0, audioUrl = null) {
    const msg = document.createElement("div");
    msg.className = `message ${isSelf ? "self" : "other"}`;

    const avatar = document.createElement("span");
    avatar.className = "avatar";
    avatar.textContent = sender.avatar;

    const nick = document.createElement("span");
    nick.className = "nickname";
    nick.textContent = sender.nickname;

    let content;

    if (isVoice && audioUrl) {
        content = document.createElement("div");
        content.className = "voice-bubble";
        content.innerHTML = `
            🎵
            <span class="voice-duration">${duration.toFixed(1)}″</span>
            <div class="waveform">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
        `;

        content.addEventListener("click", () => new Audio(audioUrl).play());

        let timer;
        content.addEventListener("mousedown", () => {
            content.classList.add("show-wave");
            timer = setTimeout(() => content.classList.remove("show-wave"), 2000);
        });
        content.addEventListener("mouseup", () => clearTimeout(timer));
        content.addEventListener("mouseleave", () => clearTimeout(timer));

        if (isSelf) {
            msg.addEventListener("contextmenu", e => {
                e.preventDefault();
                showConfirm("确定要删除这条语音吗？", () => {
                    msg.remove();
                    showSystemToast("语音已删除");
                });
            });
        }

    } else {
        content = document.createTextNode(text);
        msg.dataset.text = text;

        if (isSelf) {
            msg.addEventListener("contextmenu", e => {
                e.preventDefault();
                showConfirm("确定要撤回这条消息吗？", () => {
                    textInput.value = text;
                    textInput.focus();
                    msg.remove();
                    showSystemToast("已撤回，快改吧 😂");
                });
            });
        }
    }

    msg.appendChild(avatar);
    msg.appendChild(nick);
    msg.appendChild(content);

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 防刷 ===== */
let messageHistory = [];
let messageCount = 0;

/* ===== 机器人问候 ===== */
window.onload = () => {
    updatePoints();
    checkSignStatus();
    showSystemToast("✅ 聊天室已连接");

    bots.forEach((bot, i) => {
        setTimeout(() => {
            const t = bot.texts[Math.floor(Math.random() * bot.texts.length)];
            renderMessage(t, false, bot);
        }, 800 * (i + 1));
    });
};

/* ===== 发送文本 ===== */
function sendText() {
    const text = textInput.value.trim();
    if (!text) return;

    messageHistory.push(text);
    if (messageHistory.length > 3) messageHistory.shift();

    const isSpam = messageHistory.length === 3 &&
        messageHistory[0] === messageHistory[1] &&
        messageHistory[1] === messageHistory[2];

    if (isSpam) {
        showSystemToast("🚫 别刷屏啦，积分没了～");
        textInput.value = "";
        textInput.style.height = "auto";
        return;
    }

    renderMessage(text, true, currentUser);
    textInput.value = "";
    textInput.style.height = "auto";

    messageCount++;
    if (messageCount % 2 === 0) {
        points += 1;
        updatePoints();
        showSystemToast("💰 发消息 +1 积分");
    }
}

/* ===== 快捷键 ===== */
textInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && e.ctrlKey) {
        e.preventDefault();
        sendText();
    }
});

sendBtn.onclick = sendText;

/* ===== 录音 ===== */
recordBtn.onmousedown = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        recordStartTime = Date.now();

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        recordBtn.classList.add("recording");

        maxDurationTimer = setTimeout(() => {
            mediaRecorder.stop();
            recordBtn.classList.remove("recording");
            showSystemToast("最长只能录 30 秒哦～");
        }, MAX_DURATION * 1000);

    } catch {
        showSystemToast("麦克风权限被拒绝 😢");
    }
};

recordBtn.onmouseup = () => {
    if (!mediaRecorder || mediaRecorder.state === "inactive") return;
    clearTimeout(maxDurationTimer);
    mediaRecorder.stop();
    recordBtn.classList.remove("recording");

    mediaRecorder.addEventListener("stop", () => {
        const duration = (Date.now() - recordStartTime) / 1000;
        if (duration < MIN_DURATION) {
            showSystemToast("录音时间太短啦～");
            return;
        }
        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
        const audioUrl = URL.createObjectURL(audioBlob);
        renderMessage("", true, currentUser, true, duration, audioUrl);
    }, { once: true });
};
</script>

</body>
</html>
