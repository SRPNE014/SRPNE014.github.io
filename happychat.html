<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属聊天室</title>

<style>
/* ===== iOS 26 纯白风 ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-container {
    width: 95vw;
    max-width: 900px;
    height: 90vh;
    max-height: 700px;
    background: rgba(245, 245, 247, 0.85);
    border-radius: 22px;
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* --- 顶部导航栏 --- */
.header {
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: transparent;
    border-bottom: 1px solid rgba(0,0,0,0.03);
    position: relative;
    z-index: 10;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    /* 给标题加一点左边距，避免太贴边 */
    padding-left: 10px;
}

.header-title {
    font-size: 18px;
    font-weight: 600;
    color: #000;
    display: flex;
    align-items: center;
    gap: 6px;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* --- 功能按钮样式 --- */
.icon-btn {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,0,0,0.05);
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
}

.icon-btn:hover {
    background: rgba(255,255,255,1);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.badge {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
    margin-left: 4px;
}

.badge-green {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
}

.badge-yellow {
    background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
}

/* --- 聊天区域 --- */
.chat-area {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: transparent;
}

.message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    position: relative;
    word-wrap: break-word;
}

.message.self {
    align-self: flex-end;
    background: #007AFF;
    color: white;
    border-bottom-right-radius: 4px;
}

.message.other {
    align-self: flex-start;
    background: #E5E5EA;
    color: black;
    border-bottom-left-radius: 4px;
}

.message .name {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 4px;
    font-weight: 500;
}

/* --- 输入区域 --- */
.input-area {
    padding: 15px 20px;
    background: rgba(255,255,255,0.8);
    border-top: 1px solid rgba(0,0,0,0.03);
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
}

.input-box {
    flex: 1;
    padding: 10px 15px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 20px;
    font-size: 15px;
    outline: none;
    background: rgba(255,255,255,0.9);
    transition: all 0.2s;
}

.input-box:focus {
    border-color: #007AFF;
    box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
}

.send-btn {
    background: #007AFF;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.send-btn:hover {
    background: #0051D5;
    transform: scale(1.02);
}

.action-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(0,0,0,0.05);
}

.action-btn:hover {
    background: rgba(255,255,255,1);
    transform: scale(1.05);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* --- 个人主页/弹窗 --- */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(5px);
}

.modal-content {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
}

.modal-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #000;
}

.avatar-upload {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #F2F2F7;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    border: 2px dashed #D1D1D6;
    transition: all 0.2s;
}

.avatar-upload:hover {
    border-color: #007AFF;
    background: #E5F1FF;
}

.avatar-upload img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.signature-input {
    width: 100%;
    padding: 12px;
    border: 1px solid #D1D1D6;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 15px;
    outline: none;
    resize: none;
    height: 80px;
    font-family: inherit;
}

.signature-input:focus {
    border-color: #007AFF;
}

.btn-group {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.btn {
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
}

.btn-primary {
    background: #007AFF;
    color: white;
}

.btn-primary:hover {
    background: #0051D5;
}

.btn-secondary {
    background: #F2F2F7;
    color: #000;
}

.btn-secondary:hover {
    background: #E5E5EA;
}

/* --- 警告弹窗 --- */
.alert-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    z-index: 1001;
    text-align: center;
    display: none;
}

.alert-box p {
    margin-bottom: 20px;
    font-size: 16px;
    color: #000;
}

.alert-box button {
    padding: 8px 20px;
    border-radius: 10px;
    border: none;
    background: #007AFF;
    color: white;
    font-size: 14px;
    cursor: pointer;
    margin: 0 5px;
}

.alert-box button.cancel {
    background: #8E8E93;
}

/* --- 隐藏滚动条 --- */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.1);
    border-radius: 3px;
}

/* --- 响应式 --- */
@media (max-width: 768px) {
    .header {
        padding: 10px 15px;
    }
    
    .chat-container {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        border-radius: 0;
    }
    
    .message {
        max-width: 85%;
    }
}
</style>
</head>
<body>

<div class="chat-container">
    <!-- 顶部标题栏 -->
    <div class="header">
        <div class="header-left">
            <div class="header-title">
                💬 我的专属聊天室
            </div>
        </div>
        
        <div class="header-right">
            <div class="icon-btn" id="shopBtn">🛒 积分商城</div>
            <div class="icon-btn badge-green">✅ 已签到 - 连续 1 天</div>
            <div class="icon-btn" id="resetAvatarBtn">🔄 重置头像</div>
            <div class="icon-btn badge-yellow">💰 50</div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-area" id="chatArea">
        <div class="message other">
            <div class="name">夏洛希</div>
            Hello! 看看这个聊天室~
        </div>
        <div class="message self">
            <div class="name">张三</div>
            Nice UI!
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <div class="action-btn" id="emojiBtn">😊</div>
        <div class="action-btn" id="voiceBtn">🎙️</div>
        <input type="text" class="input-box" id="messageInput" placeholder="说点什么...">
        <button class="send-btn" id="sendBtn">发送</button>
    </div>
</div>

<!-- 个人主页弹窗 -->
<div class="modal-overlay" id="profileModal">
    <div class="modal-content">
        <div class="modal-title">个人主页</div>
        <div class="avatar-upload" id="avatarUpload">
            <span>👤</span>
            <img id="avatarPreview" src="" alt="头像">
        </div>
        <textarea class="signature-input" id="signatureInput" placeholder="写点什么吧..."></textarea>
        <div class="btn-group">
            <button class="btn btn-primary" id="saveProfileBtn">保存</button>
            <button class="btn btn-secondary" id="closeModalBtn">关闭</button>
        </div>
    </div>
</div>

<!-- 警告弹窗 -->
<div class="alert-box" id="alertBox">
    <p id="alertText">确定要重置头像吗？
    <button id="confirmBtn">确定</button>
    <button class="cancel" id="cancelBtn">取消</button>
</div>

<script>
// 数据存储
let userData = JSON.parse(localStorage.getItem('userData')) || {
    avatar: '',
    signature: '这个人很懒，什么都没留下',
    coins: 50,
    lastSignDate: ''
};

// DOM 元素
const chatArea = document.getElementById('chatArea');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const emojiBtn = document.getElementById('emojiBtn');
const voiceBtn = document.getElementById('voiceBtn');
const profileModal = document.getElementById('profileModal');
const avatarUpload = document.getElementById('avatarUpload');
const avatarPreview = document.getElementById('avatarPreview');
const signatureInput = document.getElementById('signatureInput');
const saveProfileBtn = document.getElementById('saveProfileBtn');
const closeModalBtn = document.getElementById('closeModalBtn');
const resetAvatarBtn = document.getElementById('resetAvatarBtn');
const alertBox = document.getElementById('alertBox');
const alertText = document.getElementById('alertText');
const confirmBtn = document.getElementById('confirmBtn');
const cancelBtn = document.getElementById('cancelBtn');
const shopBtn = document.getElementById('shopBtn');

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    updateUI();
    loadMessages();
});

// 更新UI
function updateUI() {
    // 更新头像
    if (userData.avatar) {
        avatarPreview.src = userData.avatar;
        avatarPreview.style.display = 'block';
        avatarUpload.querySelector('span').style.display = 'none';
    } else {
        avatarPreview.style.display = 'none';
        avatarUpload.querySelector('span').style.display = 'flex';
    }
    
    // 更新签名
    signatureInput.value = userData.signature;
    
    // 更新金币
    document.querySelector('.badge-yellow').textContent = `💰 ${userData.coins}`;
}

// 加载消息
function loadMessages() {
    const messages = JSON.parse(localStorage.getItem('messages')) || [];
    chatArea.innerHTML = '';
    messages.forEach(msg => {
        addMessageToChat(msg.text, msg.sender, msg.type);
    });
}

// 添加消息到聊天区
function addMessageToChat(text, sender = '张三', type = 'self') {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${type}`;
    messageDiv.innerHTML = `<div class="name">${sender}</div>${text}`;
    chatArea.appendChild(messageDiv);
    chatArea.scrollTop = chatArea.scrollHeight;
    
    // 保存到本地
    const messages = JSON.parse(localStorage.getItem('messages')) || [];
    messages.push({ text, sender, type, time: new Date().toISOString() });
    localStorage.setItem('messages', JSON.stringify(messages));
}

// 发送消息
sendBtn.addEventListener('click', sendMessage);
messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.ctrlKey) {
        e.preventDefault();
        sendMessage();
    }
});

function sendMessage() {
    const text = messageInput.value.trim();
    if (text) {
        addMessageToChat(text, '我', 'self');
        messageInput.value = '';
        
        // 模拟回复
        setTimeout(() => {
            addMessageToChat('收到了你的消息！', '夏洛希', 'other');
        }, 1000);
    }
}

// 表情按钮
emojiBtn.addEventListener('click', () => {
    const emojis = ['😊', '😂', '❤️', '👍', '🎉', '🤔', '🥺', '🔥'];
    const emoji = emojis[Math.floor(Math.random() * emojis.length)];
    messageInput.value += emoji;
    messageInput.focus();
});

// 语音按钮
voiceBtn.addEventListener('click', () => {
    alert('语音功能需要麦克风权限，这里模拟30秒录音...');
    let count = 30;
    const timer = setInterval(() => {
        count--;
        if (count <= 0) {
            clearInterval(timer);
            alert('录音结束！');
        }
    }, 1000);
});

// 打开个人主页
document.querySelector('.header-title').addEventListener('click', openProfileModal);
document.querySelector('.header-title').style.cursor = 'pointer';

function openProfileModal() {
    profileModal.style.display = 'flex';
    updateUI();
}

// 关闭弹窗
closeModalBtn.addEventListener('click', () => {
    profileModal.style.display = 'none';
});

// 头像上传
avatarUpload.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                userData.avatar = event.target.result;
                updateUI();
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
});

// 保存个人资料
saveProfileBtn.addEventListener('click', () => {
    userData.signature = signatureInput.value;
    localStorage.setItem('userData', JSON.stringify(userData));
    alert('保存成功！');
    profileModal.style.display = 'none';
});

// 重置头像
resetAvatarBtn.addEventListener('click', () => {
    if (!userData.avatar) {
        alert('你还没有上传过头像！');
        return;
    }
    
    alertText.textContent = '确定要重置为默认头像吗？';
    alertBox.style.display = 'block';
    
    confirmBtn.onclick = () => {
        userData.avatar = '';
        localStorage.setItem('userData', JSON.stringify(userData));
        updateUI();
        alertBox.style.display = 'none';
        alert('头像已重置为默认！');
    };
    
    cancelBtn.onclick = () => {
        alertBox.style.display = 'none';
    };
});

// 商城按钮
shopBtn.addEventListener('click', () => {
    alert('积分商城开发中...');
});

// 点击遮罩层关闭弹窗
profileModal.addEventListener('click', (e) => {
    if (e.target === profileModal) {
        profileModal.style.display = 'none';
    }
});

alertBox.addEventListener('click', (e) => {
    if (e.target === alertBox) {
        alertBox.style.display = 'none';
    }
});
</script>

</body>
</html>
