<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的专属聊天室</title>

<style>
/* ===== iOS 26 纯白风 ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-container {
    width: 95vw;
    max-width: 900px;
    height: 90vh;
    max-height: 700px;
    background: rgba(245, 245, 247, 0.85);
    border-radius: 22px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* 顶部栏 */
.header {
    padding: 16px 20px;
    background: rgba(255, 255, 255, 0.6);
    border-bottom: 1px solid rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.title {
    font-size: 17px;
    font-weight: 600;
    color: #1d1d1f;
}

/* --- 新增：重置头像按钮 --- */
.reset-avatar-btn {
    background: rgba(0, 122, 255, 0.1);
    color: #007aff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.2s; /* 微微过渡一下悬停，可选 */
}
.reset-avatar-btn:hover {
    background: rgba(0, 122, 255, 0.15);
}

/* 聊天区 */
.chat-area {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* 消息框 */
.msg {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 18px;
    position: relative;
    word-wrap: break-word;
    line-height: 1.4;
    font-size: 15px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}

.msg.me {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.05);
    align-self: flex-end;
    border-bottom-right-radius: 6px;
}

.msg.other {
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(0,0,0,0.05);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
}

.username {
    font-size: 12px;
    color: #636366;
    margin-bottom: 4px;
    font-weight: 500;
}

/* 输入区 */
.input-area {
    padding: 16px 20px;
    background: rgba(255, 255, 255, 0.6);
    border-top: 1px solid rgba(0,0,0,0.05);
    display: flex;
    gap: 10px;
    align-items: flex-end;
}

textarea {
    flex: 1;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
}

.send-btn, .emoji-btn, .voice-btn {
    background: #007aff;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 15px;
    cursor: pointer;
    font-weight: 500;
}

.voice-btn { background: #8e8e93; }
.emoji-btn { background: #ff9500; }

/* --- 个人主页弹窗 --- */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-card {
    width: 90%;
    max-width: 360px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(30px);
    border-radius: 24px;
    padding: 28px 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* 主页头部：头像 + 昵称 + 签名 */
.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
}

.avatar-wrapper {
    position: relative;
    cursor: pointer;
}

.avatar-img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #e5e5e7;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    color: #636366;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    object-fit: cover;
}

.avatar-upload {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 24px;
    height: 24px;
    background: #007aff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 14px;
    border: 2px solid #fff;
    cursor: pointer;
}

.info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.nickname {
    font-size: 20px;
    font-weight: 600;
    color: #1d1d1f;
}

.signature {
    font-size: 14px;
    color: #636366;
    font-style: italic;
    cursor: pointer;
    padding: 6px 0;
    border-radius: 6px;
    position: relative;
}

.signature:hover {
    background: rgba(0,0,0,0.03);
}

.signature-input {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
    min-height: 40px;
    background: #fff;
}

.signature-actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
}

.edit-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
}

.edit-confirm { background: #007aff; color: white; }
.edit-cancel { background: #e5e5e7; color: #1d1d1f; }

/* 警告弹窗 */
.alert-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    padding: 20px 24px;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 2000;
    text-align: center;
    max-width: 260px;
    display: none;
}

.alert-text {
    margin-bottom: 16px;
    font-size: 15px;
    color: #1d1d1f;
    line-height: 1.4;
}

.alert-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.alert-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
}

.alert-confirm { background: #ff3b30; color: white; border-color: #ff3b30; }
.alert-cancel { color: #007aff; }
</style>

</head>
<body>

<div class="chat-container">
    <!-- 顶部栏 -->
    <div class="header">
        <div class="title">💬 我的专属聊天室</div>
        <!-- 新增：重置头像按钮 -->
        <button class="reset-avatar-btn" id="resetAvatarBtn">🔄 重置头像</button>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-area" id="chatArea">
        <!-- 示例消息 -->
        <div class="msg me">
            <div class="username">夏洛希</div>
            Hello! 看看这个聊天室~
        </div>
        <div class="msg other">
            <div class="username">张三</div>
            Nice UI!
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <textarea id="msgInput" placeholder="说点什么..."></textarea>
        <button class="emoji-btn">😊</button>
        <button class="voice-btn">🎙️</button>
        <button class="send-btn" id="sendBtn">发送</button>
    </div>
</div>

<!-- 个人主页弹窗 -->
<div class="modal-overlay" id="profileModal">
    <div class="modal-card">
        <div class="profile-header">
            <div class="avatar-wrapper" onclick="document.getElementById('avatarFile').click()">
                <img id="profileAvatar" class="avatar-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23636666' d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="头像">
                <div class="avatar-upload">+</div>
                <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
            </div>
            <div class="info">
                <div class="nickname">夏洛希</div>
                <div class="signature" id="signatureText" onclick="editSignature()">
                    “点击编辑个性签名”
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 警告弹窗 -->
<div class="alert-box" id="alertBox">
    <div class="alert-text">确定要重置头像吗？这将恢复为你上次上传的自定义头像。</div>
    <div class="alert-actions">
        <button class="alert-btn alert-cancel" onclick="closeAlert()">取消</button>
        <button class="alert-btn alert-confirm" onclick="confirmResetAvatar()">确定重置</button>
    </div>
</div>

<script>
// ===== 全局状态 =====
let currentSignature = "“点击编辑个性签名”";

// ===== 页面加载 =====
window.onload = () => {
    loadData();
    // 默认打开个人主页（调试用，实际可以注释掉）
    // openProfile(); 
};

// ===== 数据持久化 =====
function loadData() {
    const savedAvatar = localStorage.getItem('myAvatar');
    const savedSignature = localStorage.getItem('mySignature');
    
    if (savedAvatar) {
        document.getElementById('profileAvatar').src = savedAvatar;
    }
    if (savedSignature) {
        currentSignature = savedSignature;
        document.getElementById('signatureText').innerText = savedSignature;
    }
}

// ===== 个人主页 =====
function openProfile() {
    document.getElementById('profileModal').style.display = 'flex';
    loadData(); // 确保显示最新的
}

function closeProfile() {
    document.getElementById('profileModal').style.display = 'none';
}

// ===== 签名编辑 =====
function editSignature() {
    const textEl = document.getElementById('signatureText');
    const currentText = textEl.innerText.replace(/^“|”$/g, ''); // 去掉引号
    
    const input = document.createElement('textarea');
    input.className = 'signature-input';
    input.value = currentText;
    input.rows = 1;
    
    const actions = document.createElement('div');
    actions.className = 'signature-actions';
    actions.innerHTML = `
        <button class="edit-btn edit-confirm" onclick="saveSignature(this)">保存</button>
        <button class="edit-btn edit-cancel" onclick="cancelEditSignature(this)">取消</button>
    `;
    
    textEl.innerHTML = '';
    textEl.appendChild(input);
    textEl.appendChild(actions);
    
    input.focus();
    autoResizeTextarea(input);
    input.addEventListener('input', () => autoResizeTextarea(input));
}

function autoResizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = (el.scrollHeight) + 'px';
}

function saveSignature(btn) {
    const input = btn.parentElement.querySelector('textarea');
    let val = input.value.trim();
    if (!val) val = '“没有签名”';
    if (!val.startsWith('“')) val = '“' + val;
    if (!val.endsWith('”')) val += '”';
    
    currentSignature = val;
    localStorage.setItem('mySignature', val);
    document.getElementById('signatureText').innerText = val;
}

function cancelEditSignature(btn) {
    document.getElementById('signatureText').innerText = currentSignature;
}

// ===== 头像上传 =====
function handleAvatarUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件！');
        return;
    }
    
    const reader = new FileReader();
    reader.onload = (e) => {
        const base64 = e.target.result;
        document.getElementById('profileAvatar').src = base64;
        localStorage.setItem('myAvatar', base64); // 存起来
        alert('头像上传成功！');
    };
    reader.readAsDataURL(file);
}

// ===== 重置头像 =====
function confirmResetAvatar() {
    // 从 LocalStorage 读取之前存的头像
    const savedAvatar = localStorage.getItem('myAvatar');
    if (savedAvatar) {
        document.getElementById('profileAvatar').src = savedAvatar;
        alert('头像已重置为之前上传的版本！');
    } else {
        // 如果没存过，就恢复默认
        const defaultAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23636666' d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        document.getElementById('profileAvatar').src = defaultAvatar;
        alert('没有找到之前上传的头像，已重置为默认头像！');
    }
    closeAlert();
}

// ===== 警告框控制 =====
function showAlert() {
    document.getElementById('alertBox').style.display = 'block';
}

function closeAlert() {
    document.getElementById('alertBox').style.display = 'none';
}

// ===== 绑定重置按钮 =====
document.getElementById('resetAvatarBtn').addEventListener('click', showAlert);

// ===== 模拟发送消息 =====
document.getElementById('sendBtn').addEventListener('click', sendMsg);
document.getElementById('msgInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
    }
});

function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg me';
    div.innerHTML = `<div class="username">夏洛希</div>${text}`;
    
    chatArea.appendChild(div);
    input.value = '';
    chatArea.scrollTop = chatArea.scrollHeight;
}

// 点击遮罩关闭主页（可选）
document.getElementById('profileModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('profileModal')) {
        closeProfile();
    }
});
</script>

</body>
</html>
