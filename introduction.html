<style>
/* ===== 背景：星空 + 星轨 + 彩虹 ===== */
body {
    background: #0b0f1a;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 1%, transparent 1%),
        radial-gradient(1px 1px at 30% 60%, #fff 1%, transparent 1%);
    z-index: -3;
}

body::after {
    content: "";
    position: fixed;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255,255,255,0.08) 30deg,
        transparent 60deg,
        transparent 180deg,
        rgba(255,255,255,0.08) 210deg,
        transparent 240deg,
        transparent 360deg
    );
    animation: starTrail 40s linear infinite;
    z-index: -2;
    filter: blur(6px);
}

@keyframes starTrail {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.rainbow-bg {
    position: fixed;
    inset: -50%;
    background: conic-gradient(
        from 0deg,
        #ff0000,
        #ff7f00,
        #ffff00,
        #00ff00,
        #00ffff,
        #0000ff,
        #8b00ff,
        #ff0000
    );
    animation: rainbowSpin 21s linear infinite;
    z-index: -1;
    opacity: 0.25;
    filter: blur(120px);
}

@keyframes rainbowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
