<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页 - 夏洛希</title>
<style>
/* ===== Reset & Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== Profile Card ===== */
.profile-card {
    display: flex;
    align-items: center;
    gap: 24px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 28px 36px;
    border-radius: 22px;
    box-shadow:
        0 0 0 0.5px rgba(0,0,0,0.08),
        0 20px 60px rgba(0,0,0,0.08);
    max-width: 480px;
    width: 90vw;
}

/* ===== 左侧：头像 + 昵称 ===== */
.profile-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34c759, #30d158);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: #fff;
    font-weight: 700;
    /* 如需真实图片：取消注释下一行并放 <img> 进 .avatar-circle */
    /* overflow: hidden; */
    box-shadow: 0 4px 16px rgba(52,195,89,0.3);
}

/* 用图片时替换 .avatar 内文字为：
<img src="your-avatar.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
*/

.nickname {
    margin-top: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #1d1d1f;
    white-space: nowrap;
}

/* ===== 右侧：个性签名 ===== */
.profile-right {
    display: flex;
    align-items: center;
    min-height: 80px;
}

.signature {
    font-size: 15px;
    line-height: 1.6;
    color: #86868b;
    font-style: italic;
    border-left: 3px solid #007AFF;
    padding-left: 16px;
}

/* ===== 移动端：纵向排列 ===== */
@media (max-width: 520px) {
    .profile-card {
        flex-direction: column;
        text-align: center;
        padding: 24px;
        gap: 16px;
    }
    .profile-right {
        min-height: auto;
    }
    .signature {
        border-left: none;
        padding-left: 0;
        border-top: 2px solid #007AFF;
        padding-top: 12px;
    }
}
</style>
</head>

<body>

<div class="profile-card">
    <!-- 左侧：头像 + 昵称 -->
    <div class="profile-left">
        <div class="avatar">夏</div>
        <div class="nickname">夏洛希</div>
    </div>

    <!-- 右侧：个性签名 -->
    <div class="profile-right">
        <p class="signature">"万物皆有裂痕，那是光照进来的地方。"</p>
    </div>
</div>

</body>
</html>
